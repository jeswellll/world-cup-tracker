<div class="group-table glass-panel">
  <h3>Group {{groupName}}</h3>
  <table>
    <thead>
      <tr>
        <th>Team</th>
        <th>P</th>
        <th>W</th>
        <th>D</th>
        <th>L</th>
        <th>GD</th>
        <th>Pts</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let row of standings; let i = index"
          [class.top-two]="i < 2" 
          [class.third]="i === 2">
        <td class="team-cell">
          <span *ngIf="row.code" class="fi" [ngClass]="'fi-' + row.code.toLowerCase()"></span>
          {{ row.team }}
        </td>
        <td>{{row.played}}</td>
        <td>{{row.won}}</td>
        <td>{{row.drawn}}</td>
        <td>{{row.lost}}</td>
        <td>{{row.gd}}</td>
        <td><strong>{{row.points}}</strong></td>
      </tr>
    </tbody>
  </table>

  <!-- Matches for this group -->
  <app-group-matches [groupName]="groupName"></app-group-matches>
</div>
